naftiko: 1.0.0-alpha2
info:
  label: API Snap
  description: >-
    13+ developer utility APIs in a single REST service - QR codes, screenshots,
    image resize, HTML-to-PDF, Markdown-to-HTML, URL metadata, hashing, JWT
    decode, Base64, UUID generation, color conversion, lorem ipsum, and SVG
    placeholders. One Bearer API key (snp_) authorizes all endpoints.
  tags:
    - API Snap
    - Developer Utilities
    - QR Codes
    - Screenshots
    - Image Processing
    - PDF Generation
    - Markdown
    - URL Metadata
    - Hashing
    - JWT
    - Base64
    - UUID
    - Color
    - Lorem Ipsum
    - Placeholder Images
  created: '2026-05-06'
  modified: '2026-05-06'
binds:
  - namespace: env
    keys:
      API_SNAP_API_KEY: API_SNAP_API_KEY
capability:
  consumes:
    - type: http
      namespace: api-snap
      baseUri: https://api-snap.com
      description: API Snap unified developer utilities REST service
      authentication:
        type: bearer
        token: '{{env.API_SNAP_API_KEY}}'
      resources:
        - name: images
          path: /api
          description: Image generation and processing endpoints (QR, resize, placeholder)
          operations:
            - name: generateQrCode
              method: GET
              path: /qr
              description: Generate a QR code as PNG or SVG
              inputParameters:
                - name: data
                  in: query
                  type: string
                  required: true
                  description: Text or URL to encode
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: Image size in pixels (1-1000)
                - name: format
                  in: query
                  type: string
                  required: false
                  description: png or svg
                - name: dark
                  in: query
                  type: string
                  required: false
                  description: Foreground hex color
                - name: light
                  in: query
                  type: string
                  required: false
                  description: Background hex color
              outputRawFormat: binary
            - name: resizeImage
              method: POST
              path: /resize
              description: Resize and convert images
              inputParameters:
                - name: image
                  in: body
                  type: string
                  required: false
                  description: Base64 image content
                - name: url
                  in: body
                  type: string
                  required: false
                  description: Remote image URL to fetch
                - name: width
                  in: body
                  type: integer
                  required: false
                  description: Target width in pixels (max 4096)
                - name: height
                  in: body
                  type: integer
                  required: false
                  description: Target height in pixels (max 4096)
                - name: format
                  in: body
                  type: string
                  required: false
                  description: png, jpeg, webp, or avif
                - name: quality
                  in: body
                  type: integer
                  required: false
                  description: Output quality 1-100
                - name: fit
                  in: body
                  type: string
                  required: false
                  description: cover, contain, fill, inside, or outside
              body:
                type: json
                data:
                  image: '{{tools.image}}'
                  url: '{{tools.url}}'
                  width: '{{tools.width}}'
                  height: '{{tools.height}}'
                  format: '{{tools.format}}'
                  quality: '{{tools.quality}}'
                  fit: '{{tools.fit}}'
              outputRawFormat: binary
            - name: generatePlaceholderImage
              method: GET
              path: /placeholder
              description: Generate an SVG placeholder image
              inputParameters:
                - name: w
                  in: query
                  type: integer
                  required: false
                  description: Width in pixels (1-2000)
                - name: h
                  in: query
                  type: integer
                  required: false
                  description: Height in pixels (1-2000)
                - name: bg
                  in: query
                  type: string
                  required: false
                  description: Background hex color (no #)
                - name: fg
                  in: query
                  type: string
                  required: false
                  description: Foreground hex color (no #)
                - name: text
                  in: query
                  type: string
                  required: false
                  description: Optional center label
              outputRawFormat: binary
        - name: browser
          path: /api
          description: Headless browser endpoints (screenshot)
          operations:
            - name: captureScreenshot
              method: GET
              path: /screenshot
              description: Capture a webpage screenshot
              inputParameters:
                - name: url
                  in: query
                  type: string
                  required: true
                  description: URL of the page to capture
                - name: width
                  in: query
                  type: integer
                  required: false
                  description: Viewport width
                - name: height
                  in: query
                  type: integer
                  required: false
                  description: Viewport height
                - name: format
                  in: query
                  type: string
                  required: false
                  description: png or jpeg
                - name: full_page
                  in: query
                  type: boolean
                  required: false
                  description: Capture full scrollable page
              outputRawFormat: binary
        - name: documents
          path: /api
          description: Document conversion endpoints (PDF, Markdown)
          operations:
            - name: htmlToPdf
              method: POST
              path: /pdf
              description: Convert HTML to PDF
              inputParameters:
                - name: html
                  in: body
                  type: string
                  required: true
                  description: HTML content to render
                - name: title
                  in: body
                  type: string
                  required: false
                  description: PDF filename / title
              body:
                type: json
                data:
                  html: '{{tools.html}}'
                  title: '{{tools.title}}'
              outputRawFormat: binary
            - name: markdownToHtml
              method: POST
              path: /markdown
              description: Convert Markdown to HTML
              inputParameters:
                - name: markdown
                  in: body
                  type: string
                  required: true
                  description: Markdown content
                - name: styled
                  in: body
                  type: boolean
                  required: false
                  description: Return styled full-page HTML or JSON fragment
              body:
                type: json
                data:
                  markdown: '{{tools.markdown}}'
                  styled: '{{tools.styled}}'
              outputRawFormat: json
        - name: security
          path: /api
          description: Security and crypto utilities (hash, JWT decode)
          operations:
            - name: hashStringGet
              method: GET
              path: /hash
              description: Hash a string via query parameters
              inputParameters:
                - name: text
                  in: query
                  type: string
                  required: true
                  description: Text to hash
                - name: algorithm
                  in: query
                  type: string
                  required: false
                  description: md5, sha1, sha256, sha512, sha384, sha3-256, sha3-512
                - name: encoding
                  in: query
                  type: string
                  required: false
                  description: hex, base64, or base64url
              outputRawFormat: json
            - name: hashStringPost
              method: POST
              path: /hash
              description: Hash a string via JSON body
              inputParameters:
                - name: text
                  in: body
                  type: string
                  required: true
                  description: Text to hash
                - name: algorithm
                  in: body
                  type: string
                  required: false
                  description: Hash algorithm
                - name: encoding
                  in: body
                  type: string
                  required: false
                  description: Output encoding
              body:
                type: json
                data:
                  text: '{{tools.text}}'
                  algorithm: '{{tools.algorithm}}'
                  encoding: '{{tools.encoding}}'
              outputRawFormat: json
            - name: decodeJwt
              method: POST
              path: /jwt-decode
              description: Decode a JWT without verification
              inputParameters:
                - name: token
                  in: body
                  type: string
                  required: true
                  description: JWT string
              body:
                type: json
                data:
                  token: '{{tools.token}}'
              outputRawFormat: json
        - name: utilities
          path: /api
          description: General utility endpoints (UUID, meta, base64, color, lorem)
          operations:
            - name: generateId
              method: GET
              path: /uuid
              description: Generate UUIDs and unique IDs
              inputParameters:
                - name: format
                  in: query
                  type: string
                  required: false
                  description: uuid, v4, nanoid, nanoid-short, hex, base64, numeric, timestamp
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: Number of IDs to generate (1-100)
                - name: prefix
                  in: query
                  type: string
                  required: false
                  description: Optional ID prefix
              outputRawFormat: json
            - name: extractUrlMetadata
              method: GET
              path: /meta
              description: Extract URL metadata and Open Graph tags
              inputParameters:
                - name: url
                  in: query
                  type: string
                  required: true
                  description: URL to inspect
              outputRawFormat: json
            - name: base64EncodeDecode
              method: POST
              path: /base64
              description: Base64 encode or decode a string
              inputParameters:
                - name: input
                  in: body
                  type: string
                  required: true
                  description: Input string
                - name: action
                  in: body
                  type: string
                  required: false
                  description: encode or decode
                - name: urlSafe
                  in: body
                  type: boolean
                  required: false
                  description: Use URL-safe Base64 alphabet
              body:
                type: json
                data:
                  input: '{{tools.input}}'
                  action: '{{tools.action}}'
                  urlSafe: '{{tools.urlSafe}}'
              outputRawFormat: json
            - name: convertColor
              method: GET
              path: /color
              description: Convert color formats
              inputParameters:
                - name: color
                  in: query
                  type: string
                  required: true
                  description: Hex, rgb(), or hsl() color value
              outputRawFormat: json
            - name: generateLoremIpsum
              method: GET
              path: /lorem
              description: Generate lorem ipsum placeholder text
              inputParameters:
                - name: paragraphs
                  in: query
                  type: integer
                  required: false
                  description: Number of paragraphs (1-20)
                - name: sentences
                  in: query
                  type: integer
                  required: false
                  description: Sentences per paragraph (1-20)
                - name: format
                  in: query
                  type: string
                  required: false
                  description: text or html
              outputRawFormat: json
