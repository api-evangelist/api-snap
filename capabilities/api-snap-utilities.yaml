naftiko: 1.0.0-alpha2
info:
  label: API Snap — Utilities
  description: 'API Snap — Utilities. 5 operations. Lead operation: Base64 Encode or Decode. Self-contained Naftiko capability
    covering one Api Snap business surface.'
  tags:
  - Api Snap
  - Utilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    API_SNAP_API_KEY: API_SNAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-snap-utilities
    baseUri: https://api-snap.com
    description: API Snap — Utilities business capability. Self-contained, no shared references.
    resources:
    - name: api-base64
      path: /api/base64
      operations:
      - name: base64encodedecode
        method: POST
        description: Base64 Encode or Decode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-color
      path: /api/color
      operations:
      - name: convertcolor
        method: GET
        description: Convert Color Formats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: color
          in: query
          type: string
          description: Color value to convert. Accepts hex (e.g. `#ff0000` or `ff0000`), RGB (e.g. `rgb(255,0,0)`), or HSL
            (e.g. `hsl(0,100%,50%)`).
          required: true
    - name: api-lorem
      path: /api/lorem
      operations:
      - name: generateloremipsum
        method: GET
        description: Generate Lorem Ipsum Text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paragraphs
          in: query
          type: integer
          description: Number of paragraphs to generate (1–20).
        - name: sentences
          in: query
          type: integer
          description: Number of sentences per paragraph (1–20).
        - name: format
          in: query
          type: string
          description: Output format. `text` returns JSON; `html` returns `<p>` tags as HTML.
    - name: api-meta
      path: /api/meta
      operations:
      - name: extracturlmetadata
        method: GET
        description: Extract URL Metadata and Open Graph Tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: url
          in: query
          type: string
          description: The URL to extract metadata from.
          required: true
    - name: api-uuid
      path: /api/uuid
      operations:
      - name: generateid
        method: GET
        description: Generate UUIDs and Unique IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: ID format to generate.
        - name: count
          in: query
          type: integer
          description: Number of IDs to generate (1–100).
        - name: prefix
          in: query
          type: string
          description: Optional string prefix to prepend to each generated ID.
    authentication:
      type: bearer
      token: '{{env.API_SNAP_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-snap-utilities-rest
    port: 8080
    description: REST adapter for API Snap — Utilities. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/base64
      name: api-base64
      description: REST surface for api-base64.
      operations:
      - method: POST
        name: base64encodedecode
        description: Base64 Encode or Decode
        call: api-snap-utilities.base64encodedecode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/color
      name: api-color
      description: REST surface for api-color.
      operations:
      - method: GET
        name: convertcolor
        description: Convert Color Formats
        call: api-snap-utilities.convertcolor
        with:
          color: rest.color
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/lorem
      name: api-lorem
      description: REST surface for api-lorem.
      operations:
      - method: GET
        name: generateloremipsum
        description: Generate Lorem Ipsum Text
        call: api-snap-utilities.generateloremipsum
        with:
          paragraphs: rest.paragraphs
          sentences: rest.sentences
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/meta
      name: api-meta
      description: REST surface for api-meta.
      operations:
      - method: GET
        name: extracturlmetadata
        description: Extract URL Metadata and Open Graph Tags
        call: api-snap-utilities.extracturlmetadata
        with:
          url: rest.url
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/uuid
      name: api-uuid
      description: REST surface for api-uuid.
      operations:
      - method: GET
        name: generateid
        description: Generate UUIDs and Unique IDs
        call: api-snap-utilities.generateid
        with:
          format: rest.format
          count: rest.count
          prefix: rest.prefix
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-snap-utilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Snap — Utilities. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: base64-encode-decode
      description: Base64 Encode or Decode
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-snap-utilities.base64encodedecode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: convert-color-formats
      description: Convert Color Formats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-snap-utilities.convertcolor
      with:
        color: tools.color
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-lorem-ipsum-text
      description: Generate Lorem Ipsum Text
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-snap-utilities.generateloremipsum
      with:
        paragraphs: tools.paragraphs
        sentences: tools.sentences
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: extract-url-metadata-and-open
      description: Extract URL Metadata and Open Graph Tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-snap-utilities.extracturlmetadata
      with:
        url: tools.url
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-uuids-and-unique-ids
      description: Generate UUIDs and Unique IDs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-snap-utilities.generateid
      with:
        format: tools.format
        count: tools.count
        prefix: tools.prefix
      outputParameters:
      - type: object
        mapping: $.
