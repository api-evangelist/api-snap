naftiko: 1.0.0-alpha2
info:
  label: API Snap — Browser
  description: 'API Snap — Browser. 1 operations. Lead operation: Capture Webpage Screenshot. Self-contained Naftiko capability
    covering one Api Snap business surface.'
  tags:
  - Api Snap
  - Browser
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    API_SNAP_API_KEY: API_SNAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-snap-browser
    baseUri: https://api-snap.com
    description: API Snap — Browser business capability. Self-contained, no shared references.
    resources:
    - name: api-screenshot
      path: /api/screenshot
      operations:
      - name: capturescreenshot
        method: GET
        description: Capture Webpage Screenshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: url
          in: query
          type: string
          description: The URL of the webpage to screenshot.
          required: true
        - name: width
          in: query
          type: integer
          description: Viewport width in pixels (max 1920).
        - name: height
          in: query
          type: integer
          description: Viewport height in pixels (max 1080).
        - name: format
          in: query
          type: string
          description: Image output format.
        - name: full_page
          in: query
          type: boolean
          description: Capture the full scrollable page instead of only the viewport.
    authentication:
      type: bearer
      token: '{{env.API_SNAP_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-snap-browser-rest
    port: 8080
    description: REST adapter for API Snap — Browser. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/screenshot
      name: api-screenshot
      description: REST surface for api-screenshot.
      operations:
      - method: GET
        name: capturescreenshot
        description: Capture Webpage Screenshot
        call: api-snap-browser.capturescreenshot
        with:
          url: rest.url
          width: rest.width
          height: rest.height
          format: rest.format
          full_page: rest.full_page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-snap-browser-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Snap — Browser. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: capture-webpage-screenshot
      description: Capture Webpage Screenshot
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-snap-browser.capturescreenshot
      with:
        url: tools.url
        width: tools.width
        height: tools.height
        format: tools.format
        full_page: tools.full_page
      outputParameters:
      - type: object
        mapping: $.
