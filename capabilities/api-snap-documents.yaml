naftiko: 1.0.0-alpha2
info:
  label: API Snap — Documents
  description: 'API Snap — Documents. 2 operations. Lead operation: Convert Markdown to HTML. Self-contained Naftiko capability
    covering one Api Snap business surface.'
  tags:
  - Api Snap
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    API_SNAP_API_KEY: API_SNAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-snap-documents
    baseUri: https://api-snap.com
    description: API Snap — Documents business capability. Self-contained, no shared references.
    resources:
    - name: api-markdown
      path: /api/markdown
      operations:
      - name: markdowntohtml
        method: POST
        description: Convert Markdown to HTML
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-pdf
      path: /api/pdf
      operations:
      - name: htmltopdf
        method: POST
        description: Convert HTML to PDF
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.API_SNAP_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-snap-documents-rest
    port: 8080
    description: REST adapter for API Snap — Documents. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/markdown
      name: api-markdown
      description: REST surface for api-markdown.
      operations:
      - method: POST
        name: markdowntohtml
        description: Convert Markdown to HTML
        call: api-snap-documents.markdowntohtml
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/pdf
      name: api-pdf
      description: REST surface for api-pdf.
      operations:
      - method: POST
        name: htmltopdf
        description: Convert HTML to PDF
        call: api-snap-documents.htmltopdf
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-snap-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Snap — Documents. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: convert-markdown-html
      description: Convert Markdown to HTML
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-snap-documents.markdowntohtml
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: convert-html-pdf
      description: Convert HTML to PDF
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-snap-documents.htmltopdf
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
